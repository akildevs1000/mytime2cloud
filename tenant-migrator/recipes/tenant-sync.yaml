name:         tenant-sync
description:  Generic single-tenant sync. Pick the company / source / target in the UI before running.
company_id:   49                # default; override in the UI per run
remap_offset: 1000000000
source:       live-source       # default; override in the UI per run
target:       live-target       # default; override in the UI per run

# Tables auto-discovered by scanning information_schema for `company_id` columns.
# Override per-table here when the WHERE clause needs a non-default form
# (varchar columns, alternative tenant keys, etc).
table_overrides:
  designations:
    where: "company_id::text = '{{company_id}}'"
  payslips:
    where: "company_id::text = '{{company_id}}'"
  visitors:
    where: "company_id::text = '{{company_id}}'"

# The 'companies' table is special — its own `id` is the tenant key.
tenant_key_overrides:
  companies:
    where:          "id = {{company_id}}"
    foreign_filter: "id <> {{company_id}}"

# Tables without a company_id column, scoped by FK to a tenant entity.
linked_tables:
  - { table: branch_contacts,         where: "branch_id IN (SELECT id FROM branches WHERE company_id = {{company_id}})" }
  - { table: user_branches,           where: "branch_id IN (SELECT id FROM branches WHERE company_id = {{company_id}}) OR user_id IN (SELECT id FROM users WHERE company_id = {{company_id}})" }
  - { table: user_departments,        where: "department_id IN (SELECT id FROM departments WHERE company_id = {{company_id}}) OR user_id IN (SELECT id FROM users WHERE company_id = {{company_id}})" }
  - { table: announcement_department, where: "announcement_id IN (SELECT id FROM announcements WHERE company_id = {{company_id}})" }
  - { table: announcement_employee,   where: "announcement_id IN (SELECT id FROM announcements WHERE company_id = {{company_id}}) OR employee_id IN (SELECT id FROM employees WHERE company_id = {{company_id}})" }
  - { table: assign_departments,      where: "department_id IN (SELECT id FROM departments WHERE company_id = {{company_id}}) OR assigned_department_employee_id IN (SELECT id FROM assigned_department_employees WHERE company_id = {{company_id}})" }
  - { table: assign_employees,        where: "employee_id IN (SELECT id FROM employees WHERE company_id = {{company_id}}) OR assigned_department_employee_id IN (SELECT id FROM assigned_department_employees WHERE company_id = {{company_id}})" }
  - { table: finger_prints,           where: "employee_id::text IN (SELECT id::text FROM employees WHERE company_id = {{company_id}})" }
  - { table: palms,                   where: "employee_id::text IN (SELECT id::text FROM employees WHERE company_id = {{company_id}})" }
  - { table: employee_leave_timelines,where: "employee_leave_id IN (SELECT id FROM employee_leaves WHERE company_id = {{company_id}})" }
  - { table: employee_report,         where: "employee_id IN (SELECT id FROM employees WHERE company_id = {{company_id}})" }
  - { table: zone_devices,            where: "zone_id IN (SELECT id FROM zones WHERE company_id = {{company_id}}) OR device_id IN (SELECT id FROM devices WHERE company_id = {{company_id}})" }
  - { table: access_control_time_slots, where: "device_id::text IN (SELECT id::text FROM devices WHERE company_id = {{company_id}})" }
  - { table: reasons,                 where: "branch_id IN (SELECT id FROM branches WHERE company_id = {{company_id}}) OR user_id::text IN (SELECT id::text FROM users WHERE company_id = {{company_id}})" }

# When a parent's id is remapped, rewrite the child's FK column to match.
fk_cascades:
  - { child: employee_government_holidays, column: holiday_id, parent: holidays }
  - { child: employee_report,              column: report_id,  parent: report_notifications }

# Hooks (run inside the same transaction as the dump).
# pre_restore_sql: |
#   CREATE INDEX IF NOT EXISTS ...

# Realign every public-schema sequence to MAX(id) of its owning column.
# The dump inserts rows with explicit ids, so without this the app's next
# INSERT (e.g. CompanyController::store -> User::create) pulls a stale sequence
# value and trips "duplicate key value violates unique constraint users_pkey".
post_restore_sql: |
  DO $$
  DECLARE r RECORD; max_id BIGINT;
  BEGIN
    FOR r IN
      SELECT s.relname AS seq, t.relname AS tbl, a.attname AS col
        FROM pg_class s
        JOIN pg_depend d    ON d.objid    = s.oid AND d.classid = 'pg_class'::regclass
        JOIN pg_class t     ON d.refobjid = t.oid
        JOIN pg_attribute a ON a.attrelid = t.oid AND a.attnum = d.refobjsubid
        JOIN pg_namespace n ON n.oid      = s.relnamespace
       WHERE s.relkind = 'S' AND n.nspname = 'public'
    LOOP
      EXECUTE format('SELECT COALESCE(MAX(%I),0) FROM %I', r.col, r.tbl) INTO max_id;
      IF max_id > 0 THEN
        EXECUTE format('SELECT setval(%L, %s)', r.seq, max_id);
      END IF;
    END LOOP;
  END $$;
