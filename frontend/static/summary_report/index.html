<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Summary Report</title>
  <link rel="stylesheet" href="../css/vuetify.min.css" />
  <link rel="stylesheet" href="../css/materialdesignicons.min.css" />

  <script src="../js/axios.min.js"></script>
  <script src="../js/vue.js"></script>
  <script src="../js/vuetify.js"></script>
  <script src="../js/apexcharts.js"></script>
  <script src="../js/vue-apexcharts.js"></script>
  <script src="../js/html2canvas.min.js"></script>
  <script src="../js/jspdf.umd.min.js"></script>
  <style>
    .v-data-table-header th {
      border-bottom: 1px solid #fff !important;
      font-weight: bold !important;
      padding-top: 5px !important;
      padding-bottom: 5px !important;
      color: #005edf !important;
      background-color: #eeeeee !important;
    }

    .loader {
      width: fit-content;
      font-weight: bold;
      font-family: monospace;
      font-size: 30px;
      background: radial-gradient(circle closest-side, #000 94%, #0000) right/calc(200% - 1em) 100%;
      animation: l24 1s infinite alternate linear;
    }

    .loader::before {
      content: "Loading...";
      line-height: 1em;
      color: #0000;
      background: inherit;
      background-image: radial-gradient(circle closest-side, #fff 94%, #000);
      -webkit-background-clip: text;
      background-clip: text;
    }

    @keyframes l24 {
      100% {
        background-position: left
      }
    }
  </style>
</head>

<body>
  <div id="app" class="pt-5">
    <v-app>
      <v-overlay :value="overlay">
        <div class="loader"></div>
      </v-overlay>
      <v-card flat class="mx-auto" id="screenshot-target">
        <v-container fluid>
          <v-row>
            <v-col class="">
              <div class="d-flex">
                <div>
                  <v-avatar size="100">
                    <v-img :src="base64Image"></v-img>
                  </v-avatar>
                </div>
              </div>
            </v-col>
            <v-col>
              <div class="text-center pt-5">
                <div style="color: #005edf">Attendance Summary Report</div>

                <small v-if="payload" class="caption text-center py-10">{{dateRange}}</small>
              </div>
            </v-col>
            <v-col class="text-right">
              <div class="mt-5">
                <div class="title">{{company?.name}}</div>
                <div>
                  <small>{{company?.user?.email}}</small>
                </div>
                <div>
                  <small>{{company?.location}}</small>
                </div>
              </div>
            </v-col>
          </v-row>
          <v-data-table class="pt-10" dense :headers="summaryReportHeaders" :items="data" hide-default-footer
            style="min-height: 620px;">
            <template v-slot:item.employee_name="{ item }">
              <div class="pa-1" style="display: flex; align-items: center; gap: 10px">
                <v-avatar size="35">
                  <v-img :src="item?.employee_report_only?.profile_picture_base64 || '/no-profile-image.jpg'"></v-img>
                </v-avatar>
                <div>
                  <div style="font-size: 13px">
                    {{ item?.employee_report_only?.first_name || "---" }} {{
                    item?.employee_report_only?.last_name || "---" }}
                  </div>
                  <div style="font-size: 13px">
                    <small style="font-size: 12px; color: #6c7184">
                      {{ item?.employee_report_only?.department?.name || "---"
                      }} / {{ item?.employee_report_only?.branch?.branch_name || "---" }}
                    </small>
                  </div>
                </div>
              </div>
            </template>
            <template v-slot:item.p_count="{ item }">
              <small>{{ item.p_count }}</small>
            </template>
            <template v-slot:item.o_count="{ item }">
              <small>{{ item.o_count }}</small>
            </template>
            <template v-slot:item.a_count="{ item }">
              <small>{{ item.a_count }}</small>
            </template>
            <template v-slot:item.l_count="{ item }">
              <small>{{ item.l_count }}</small>
            </template>
            <template v-slot:item.average_in_time_array="{ item }">
              <small>{{ calculateAverageTime(item.average_in_time_array) }}</small>
            </template>

            <template v-slot:item.average_out_time_array="{ item }">
              <small>{{ calculateAverageTime(item.average_out_time_array)
                }}</small>
            </template>
            <template v-slot:item.average_working_hrs_array="{ item }">
              <small>{{ calculateAvgWorkingHrs( item.total_hrs_array,
                item?.employee_report_only?.schedule_all || [] ) }}</small>
            </template>
            <template v-slot:item.total_hrs_array="{ item }">
              <small>
                {{ calculateTotalHrs(item.total_hrs_array) }}/{{
                calculateHrsToPerform(item?.employee_report_only?.schedule_all
                || []) }}</small>
            </template>
          </v-data-table>
          <v-divider></v-divider>
          <v-row>
            <v-col>
              <small>
                Printed On
                <b>
                  {{new Date().toDateString()}} {{new
                  Date().toLocaleTimeString()}}</b></small>
            </v-col>
            <v-col class="text-center">
              <small>Powered By MyTime2Cloud:
                <a href="https://mytime2cloud.com/">https://mytime2cloud.com/</a></small>
            </v-col>
            <v-col cols="4" class="text-right">
              <small>This is system generated report</small>
            </v-col>
          </v-row>
        </v-container>
      </v-card>
  </div>

  </v-app>
  </div>

  <script>
    Vue.use(Vuetify);
    Vue.component("apexchart", VueApexCharts);

    new Vue({
      el: "#app",
      vuetify: new Vuetify({
        theme: {
          dark: false,
          treeShake: true,
          themes: {
            options: {
              customProperties: true,
            },
            typography: {
              fontFamily: "Source Sans Pro",
            },
            light: {
              primary: "#6946dd",
            },
          },
        },
      }),
      data() {
        return {
          overlay: true,
          BASE_URL: null,
          dialog: true,
          summaryReportHeaders: [
            {
              text: "Employee",
              align: "left",
              sortable: false,
              filterable: true,
              value: "employee_name",
              key: "employee_name",
            },
            {
              text: "Present",
              align: "center",
              sortable: false,
              filterable: true,
              value: "p_count",
            },
            {
              text: "WeekOff",
              align: "center",
              sortable: false,
              filterable: true,
              value: "o_count",
            },
            {
              text: "Absent",
              align: "center",
              sortable: false,
              filterable: true,
              value: "a_count",
            },
            {
              text: "Leave",
              align: "center",
              sortable: false,
              filterable: true,
              value: "l_count",
            },
            {
              text: "Avg CheckIn",
              align: "center",
              sortable: false,
              filterable: true,
              value: "average_in_time_array",
            },
            {
              text: "Avg CheckOut",
              align: "center",
              sortable: false,
              filterable: true,
              value: "average_out_time_array",
            },
            {
              text: "Late In",
              align: "center",
              sortable: false,
              filterable: true,
              value: "lc_count",
            },
            {
              text: "Early Out",
              align: "center",
              sortable: false,
              filterable: true,
              value: "eg_count",
            },
            {
              text: "Avg Working Hrs",
              align: "center",
              sortable: false,
              filterable: true,
              value: "average_working_hrs_array",
            },
            {
              text: "Working Hrs",
              align: "center",
              sortable: false,
              filterable: true,
              value: "total_hrs_array",
            },
          ],
          months: [],
          options: {},
          ids: [],
          departments: [],
          scheduled_employees: [],
          loading: false,
          total: 0,
          totalRowsCount: 0,
          payload: null,
          data: [],
          company: null,
          base64Image: null,
          pageCounter: 1,
        };
      },
      async mounted() {
        const params = new URLSearchParams(window.location.search);

        if (!params.has("company_id")) {
          console.warn("Required query parameters are missing.");
          return;
        }

        if (!params.has("baseUrl")) {
          console.warn("Required query parameters are missing.");
          return;
        }

        this.BASE_URL = params.get("baseUrl");

        await this.getCompanyInfo(params.get("company_id"));

        await this.getDataFromApi();
      },
      computed: {
        dateRange() {
          const from = this.payload?.from_date
            ? new Date(this.payload.from_date)
            : null;
          const to = this.payload?.to_date ? new Date(this.payload.to_date) : null;

          const format = (date) =>
            new Intl.DateTimeFormat("en-US", {
              month: "long",
              year: "numeric",
            }).format(date);

          if (from && to) {
            return `${format(from)} to ${format(to)}`;
          } else {
            return `${format(from)}`;
          }
        },
      },
      methods: {

        async getEncodedImage(url) {
          try {
            if (false) {
              url = `https://backend.mytime2cloud.com/media/employee/profile_picture/1706346188.jpg`;
            }
            let { data } = await axios.get(
              `https://backend.mytime2cloud.com/api/get-encoded-profile-picture/?url=${url}`
            );
            this.base64Image = data;
          } catch (error) {
            this.base64Image = null;
          }
        },
        async getCompanyInfo(companyId) {
          let { data } = await axios.get(
            `${this.BASE_URL}/company-short-info/${companyId}`
          );

          this.company = data;

          if (data && data.id) {
            await this.getEncodedImage(data.logo);
          }
        },
        calculateAvgWorkingHrs(timesString, schedules) {
          const times = JSON.parse(timesString);

          if (!Array.isArray(times) || times.length === 0) {
            return "00";
          }

          const totalWorkingDays =
            schedules?.reduce((acc, schedule) => {
              return (
                acc + this.countSelectedWeekdaysInMonth(schedule?.shift?.days)
              );
            }, 0) ?? 0;

          if (times && times.length) {
            let totalMinutes = times.map((time) => {
              let [hours, minutes] = time.split(":").map(Number);
              return hours * 60 + minutes;
            });

            let avgMinutes = Math.floor(
              totalMinutes.reduce((a, b) => a + b, 0)
            );

            if (totalWorkingDays == 0) return 0;
            let avgHours = Math.floor(avgMinutes / 60);
            return (avgHours / totalWorkingDays).toFixed(2);
          }
        },
        calculateAverageTime(timesString) {
          const times = JSON.parse(timesString);

          if (!Array.isArray(times) || times.length === 0) {
            return "0";
          }

          if (times && times.length) {
            let totalMinutes = times.map((time) => {
              let [hours, minutes] = time.split(":").map(Number);
              return hours * 60 + minutes;
            });

            let avgMinutes = Math.floor(
              totalMinutes.reduce((a, b) => a + b, 0) / times.length
            );

            let avgHours = Math.floor(avgMinutes / 60);
            let avgMins = avgMinutes % 60;

            return `${avgHours.toString().padStart(2, "0")}:${avgMins
              .toString()
              .padStart(2, "0")}`;
          }
        },
        calculateTotalHrs(timesString) {
          const times = JSON.parse(timesString);

          if (!Array.isArray(times) || times.length === 0) {
            return "0";
          }

          if (times && times.length) {
            let totalMinutes = times.map((time) => {
              let [hours, minutes] = time.split(":").map(Number);
              return hours * 60 + minutes;
            });

            let avgMinutes = Math.floor(
              totalMinutes.reduce((a, b) => a + b, 0)
            );

            let avgHours = Math.floor(avgMinutes / 60);
            return `${avgHours.toString().padStart(2, "0")}`;
          }
        },
        calculateHrsToPerform(schedules) {
          const result =
            schedules?.reduce((acc, schedule) => {
              const workingHours =
                parseInt(schedule?.shift?.working_hours, 10) || 0;
              return (
                acc +
                workingHours *
                this.countSelectedWeekdaysInMonth(schedule?.shift?.days)
              );
            }, 0) ?? 0;
          return result;
        },
        countSelectedWeekdaysInMonth(weekdays) {
          let months = this.payload.months;
          const weekdaysMap = {
            Sun: 0,
            Mon: 1,
            Tue: 2,
            Wed: 3,
            Thu: 4,
            Fri: 5,
            Sat: 6,
          };

          let totalCount = 0;

          months.forEach((month) => {
            const date = new Date(month + "-01");
            const year = date.getFullYear();
            const monthIndex = date.getMonth();

            const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();

            for (let day = 1; day <= daysInMonth; day++) {
              const currentDate = new Date(year, monthIndex, day);
              const dayOfWeek = currentDate.getDay();

              if (
                weekdays.some((weekday) => weekdaysMap[weekday] === dayOfWeek)
              ) {
                totalCount++;
              }
            }
          });

          return totalCount;
        },
        async getDataFromApi() {
          const params = new URLSearchParams(window.location.search);

          if (
            !params.has("from_date") ||
            !params.has("to_date") ||
            !params.has("company_id")
          ) {
            console.warn("Required query parameters are missing.");
            return;
          }

          this.payload = {
            from_date: params.get("from_date"),
            to_date: params.get("to_date"),
            page: 1,
            per_page: params.get("per_page") || 10,
            company_id: params.get("company_id"),
            employee_id: params.get("employee_id") || [],
            department_ids: params.get("department_ids") || [],
            months: params.has("months")
              ? JSON.parse(params.get("months"))
              : [],
          };

          if (params.get("branch_id") !== "null") {
            this.payload.branch_id = params.get("branch_id");
          }

          this.loading = true;
          this.data = [];
          let currentPage = 1;
          let totalPages = 1;

          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF("l", "mm", "a4");

          try {
            while (currentPage <= totalPages) {
              this.payload.page = currentPage;

              const { data } = await axios.post(
                this.BASE_URL + `/summary-report-download`,
                this.payload
              );

              if (data.data.length === 0) {
                console.warn(`No data found for page ${currentPage}`);
                break;
              }

              this.data = data.data;
              this.total = this.payload.per_page;
              this.totalRowsCount = this.payload.per_page;

              totalPages = Math.ceil(this.total / 10);

              console.log(`Fetched page ${currentPage} of ${totalPages}`);

              await this.$nextTick();

              await new Promise((resolve) => setTimeout(resolve, 1000));

              await this.waitForImagesToLoad();

              await this.generatePDF(pdf);

              currentPage++;

              this.pageCounter = currentPage;
            }
          } catch (error) {
            console.error("Error fetching data:", error);
          } finally {
            pdf.save(`Summary_Report.pdf`);
            window.close();
          }
        },
        async generatePDF(pdf) {
          const target = document.getElementById("screenshot-target");

          if (!target) {
            console.error("Target element not found!");
            return;
          }

          // Add a new page if this is not the first page
          if (this.pageCounter > 1) {
            pdf.addPage();
          }

          // Capture the entire element as one image
          const canvas = await html2canvas(target, {
            useCORS: true,
            scale: 2,
            logging: false,
          });

          const imgData = canvas.toDataURL("image/png");
          const imgWidth = 297;
          const imgHeight = (canvas.height * imgWidth) / canvas.width;

          // Add the image to the current page of the PDF
          pdf.addImage(imgData, "PNG", 0, 0, imgWidth, imgHeight);

          console.log(`✅ Added page ${this.pageCounter} to PDF`);
        },
        async generateImage(counter) {
          const target = document.getElementById("screenshot-target");

          if (!target) {
            console.error("Target element not found!");
            return;
          }

          try {
            const canvas = await html2canvas(target, {
              useCORS: true,
              scale: 3,
              logging: true,
            });

            const imgData = canvas.toDataURL("image/png");

            const link = document.createElement("a");
            link.href = imgData;
            link.download = `Summary_Report_Page_${counter}.png`;

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            console.log(
              `✅ Image downloaded: Summary_Report_Page_${counter}.png`
            );
          } catch (error) {
            console.error("Error generating image:", error);
          }
        },
        async waitForImagesToLoad() {
          const images = Array.from(document.querySelectorAll("img"));

          await Promise.all(
            images.map((img) => {
              if (img.complete) return Promise.resolve();
              return new Promise((resolve) => {
                img.onload = resolve;
                img.onerror = resolve;
              });
            })
          );
          console.log("✅ All images are loaded.");
        },
      },
    });
  </script>
</body>

</html>
